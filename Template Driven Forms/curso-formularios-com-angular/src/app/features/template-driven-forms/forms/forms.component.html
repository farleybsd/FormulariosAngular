<form
#form="ngForm"
(ngSubmit)="onSubmit(form)"
 [ngFormOptions]="{updateOn: 'blur'}"
 class="form"
 [appIsPasswordEqual]="['password','confirmPassword']">
<fieldset class="fieldset">
  <legend class="fieldset-legend">Nome</legend>
  <input
   type="text"
   class="input"
   placeholder="Nome"
   ngModel
   [ngModelOptions]="{ name: 'name',standalone: false,updateOn: 'blur' }"
   required
   />
</fieldset>

<fieldset class="fieldset">
  <legend class="fieldset-legend">E-mail</legend>
  <input
   type="email"
   class="input"
   placeholder="E-mail"
   name="email"
   ngModel
   required
   email
   />
</fieldset>

<fieldset class="fieldset">
  <legend class="fieldset-legend">Senha</legend>
  <input
   type="password"
   class="input"
   placeholder="Senha"
   name="password"
   ngModel
   required
    />
</fieldset>

<fieldset class="fieldset">
  <legend class="fieldset-legend">Confirme a Senha</legend>
  <input
   type="password"
   class="input"
   placeholder="Confirme a Senha"
   name="confirmPassword"
   ngModel
   required
   />
</fieldset>

<fieldset ngModelGroup="address" #address="ngModelGroup" class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">

  <legend class="fieldset-legend">Endereço</legend>

  <label class="label">Rua</label>
  <input
  type="text"
  class="input"
  placeholder="Avenida Paulista"
  required
  ngModel
  name="street"
   />

  <label class="label">Numero</label>
  <input
  type="text"
  class="input"
  placeholder="123"
  required
  ngModel
  name="number"
   />

  <label class="label">Complemento</label>
  <input
  type="text"
  class="input"
  placeholder="Apartment, suite, etc."
  ngModel
  name="complement"
   />
</fieldset>

<div>Formulário Erros: {{ form.errors  |json}}</div>
<div>Formulário válido: {{ form.value  |json}}</div>
<div>Endereço válido: {{ address.value  |json}}</div>
<button
 type="submit"
 class="btn btn-primary w-full mt-4"
 [disabled]="form.invalid"
 >Enviar</button>

</form>
