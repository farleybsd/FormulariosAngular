<form #form="ngForm" (ngSubmit)="onSubmit(form)" [ngFormOptions]="{updateOn: 'blur'}" class="form">
<fieldset class="fieldset">
  <legend class="fieldset-legend">Nome</legend>
  <input
   type="text"
   class="input"
   placeholder="Nome"
   ngModel
   [ngModelOptions]="{ name: 'name',standalone: false,updateOn: 'blur' }"
   required
   />
</fieldset>

<fieldset class="fieldset">
  <legend class="fieldset-legend">E-mail</legend>
  <input
   type="email"
   class="input"
   placeholder="E-mail"
   name="email"
   ngModel
   required
   email
   />
</fieldset>

<fieldset class="fieldset">
  <legend class="fieldset-legend">Senha</legend>
  <input
   type="password"
   class="input"
   placeholder="Senha"
   name="password"
   ngModel
   required
    />
</fieldset>

<fieldset class="fieldset">
  <legend class="fieldset-legend">Confirme a Senha</legend>
  <input
   type="password"
   class="input"
   placeholder="Confirme a Senha"
   name="confirmPassword"
   ngModel
   required
   />
</fieldset>

<div>
   Formulário válido: {{ form.value  |json}}
</div>
<button
 type="submit"
 class="btn btn-primary w-full mt-4"
 [disabled]="form.invalid"
 >Enviar</button>

</form>
